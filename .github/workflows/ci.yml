name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-lint:
    name: Python Linting & Formatting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8
    
    - name: Check code formatting with Black
      continue-on-error: true
      run: |
        black --check --diff scripts/
    
    - name: Lint with flake8
      continue-on-error: true
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  python-scripts:
    name: Python Script Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build Database
      run: |
        # We need to assemble the dataset first if it's not checked in (it is checked in as parquet)
        # Then build the DB
        python scripts/build_database.py
    
    - name: Validate script imports
      run: |
        python -c "import sys; sys.path.insert(0, 'scripts'); import assemble_dataset, clean_students_batches, convert_to_parquet, create_sample_dataset, generate_summary, verify_sample; print('All scripts imported successfully')"
    
    - name: Check script syntax
      run: |
        python -m py_compile scripts/*.py
    
    - name: Validate assemble_dataset.py (dry-run)
      run: |
        python scripts/assemble_dataset.py --help
    
    - name: Validate generate_summary.py structure
      run: |
        python -c "import scripts.generate_summary as gs; print('generate_summary.py structure validated')"
    
    - name: Run verify_sample.py if sample data exists
      continue-on-error: true
      run: |
        if [ -f "data/milestone1_real/sample_100K_students.parquet" ]; then
          python scripts/verify_sample.py
        else
          echo "Sample data not found, skipping verification"
        fi

  notebook-execution:
    name: Jupyter Notebook Execution
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install papermill nbconvert ipykernel
    
    - name: Build Database
      run: |
        python scripts/build_database.py
    
    - name: Execute Jupyter Notebook
      continue-on-error: true
      run: |
        if [ -f "scripts/DEPI_SQL Integration & Querying-Copy1.ipynb" ]; then
          # Create output directory
          mkdir -p output
          python -m papermill "scripts/DEPI_SQL Integration & Querying-Copy1.ipynb" /tmp/notebook_output.ipynb -k python3 || \
          jupyter nbconvert --to notebook --execute "scripts/DEPI_SQL Integration & Querying-Copy1.ipynb" --output /tmp/notebook_output.ipynb
        else
          echo "Notebook not found, skipping execution"
        fi
    
    - name: Check notebook output
      if: success()
      run: |
        if [ -f "/tmp/notebook_output.ipynb" ]; then
          echo "Notebook executed successfully"
          python -c "import json; nb = json.load(open('/tmp/notebook_output.ipynb')); errors = [c for c in nb.get('cells', []) if c.get('outputs') and any('error' in str(o) for o in c.get('outputs', []))]; exit(1 if errors else 0)"
        fi
    
    - name: Upload notebook artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: notebook-output
        path: /tmp/notebook_output.ipynb
        if-no-files-found: ignore

  react-dashboard:
    name: React Dashboard Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for package.json
      id: check_package
      run: |
        if [ -f "dashboard/package.json" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Set up Node.js
      if: steps.check_package.outputs.exists == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: dashboard/package.json
    
    - name: Install Node.js dependencies
      if: steps.check_package.outputs.exists == 'true'
      working-directory: dashboard
      run: npm ci
    
    - name: Build dashboard
      if: steps.check_package.outputs.exists == 'true'
      working-directory: dashboard
      run: |
        if grep -q '"build"' package.json; then
          npm run build
        else
          echo "No build script found in package.json"
        fi
    
    - name: Validate TypeScript syntax (manual check)
      if: steps.check_package.outputs.exists == 'false'
      run: |
        if [ -f "dashboard/edu-analytics-dashboard.tsx" ]; then
          echo "TypeScript file found but no package.json - skipping full validation"
        fi

  tests:
    name: Test Execution
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Build Database
      run: |
        python scripts/build_database.py
    
    - name: Run tests
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
          pytest tests/ -v --cov=scripts --cov-report=xml --cov-report=term
        else
          echo "No tests found, skipping test execution"
        fi
    
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

